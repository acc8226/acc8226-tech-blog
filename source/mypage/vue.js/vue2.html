<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8">
    <title>Vue.js 2 案例</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/2.7.16/vue.js"></script>
  </head>

  <body>
    <div id="app">
      {{ message }}
    </div>

    <script>
      const app = new Vue({
        el: "#app",
        data: {
          message: "Hello vue.js 2!",
        },
      });
    </script>
  </body>
</html>
